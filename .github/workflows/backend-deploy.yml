# ─────────────────────────────────────────────────────────────
# Backend CI/CD — SnapDeploy
# ─────────────────────────────────────────────────────────────
# This workflow validates the backend builds successfully and
# runs a health check against the container image.
#
# HOW DEPLOY WORKS:
#   SnapDeploy auto-deploys from your connected GitHub repo.
#   1. Go to snapdeploy.dev → Dashboard → Settings → GitHub
#   2. Connect this repo (Long104/Senzen)
#   3. Create container:
#      - Root directory: backend
#      - Port: 8080
#      - Branch: main
#   4. Set environment variables (see "Backend secrets" below)
#   5. Every push to main auto-deploys
#
# This workflow gives you CI quality gates BEFORE SnapDeploy
# picks up the push, so broken builds don't reach production.
# ─────────────────────────────────────────────────────────────

name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "go.mod"
      - "go.sum"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "go.mod"
      - "go.sum"

env:
  IMAGE_NAME: senzen-backend

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o cashwise-backend .

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Health check
        run: |
          docker run --rm -d --name backend-test \
            -e PORT=8080 \
            -p 8080:8080 \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          sleep 3
          curl -sf http://localhost:8080/health || {
            echo "::error::Health check failed"
            docker logs backend-test
            docker stop backend-test
            exit 1
          }
          echo "Health check passed"
          docker stop backend-test

  # ───────────────────────────────────────────────────────────
  # Backend secrets required in SnapDeploy dashboard:
  #
  #   DB_HOST              = your-supabase-host.supabase.co
  #   DB_PORT              = 5432
  #   DB_USER              = postgres
  #   DB_PASSWORD          = your-supabase-password
  #   DB_NAME              = postgres
  #   jwtSecretKey         = your-jwt-secret
  #   GOOGLE_CLIENT_ID     = your-google-client-id
  #   GOOGLE_CLIENT_SECRET = your-google-client-secret
  #   GITHUB_CLIENT_ID     = your-github-client-id
  #   GITHUB_CLIENT_SECRET = your-github-client-secret
  #   FRONTEND_URL         = https://senzen.vercel.app
  # ───────────────────────────────────────────────────────────
