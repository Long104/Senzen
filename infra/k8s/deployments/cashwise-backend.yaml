apiVersion: apps/v1
kind: Deployment
metadata:
  name: senzen-be-deployment
  namespace: default
  labels:
    app.kubernetes.io/name: be
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: be
      # app: senzen-frontend
  template:
    metadata:
      name: senzen-backend-pods
      labels:
        # app: senzen-frontend
        app.kubernetes.io/name: be
    spec:
      containers:
        - name: senzen-backend
          image: long104/senzen-backend:lastest
          # imagePullPolicy: IfNotPresent
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: cash-be-port
          envFrom:
            - secretRef:
                name: backend-secret
          # env:
          #   - name: BASE_URL
          #     valueFrom:
          #       secretKeyRef:
          #         name: fe-secret
          #         key: BASE_URL
---
apiVersion: v1
kind: Service
metadata:
  name: senzen-be-service
  namespace: default
spec:
  # type: NodePort
  type: ClusterIP
  selector:
    app.kubernetes.io/name: be
  ports:
    - name: cashbe-port
      protocol: TCP
      port: 8080
      targetPort: cash-be-port
      # nodePort: 30002
